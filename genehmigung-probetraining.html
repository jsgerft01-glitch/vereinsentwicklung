<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genehmigung Probetraining — JSG Erft 01 Euskirchen</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f4;min-height:100vh}
  .page-header{background:#A02820;color:#fff;padding:16px 24px;display:flex;align-items:center;gap:14px}
  .page-header img{width:48px;height:48px;border-radius:50%;border:2px solid #F0B43C}
  .page-header h1{font-size:18px;font-weight:600;margin:0}
  .page-header p{font-size:12px;opacity:0.85;margin-top:2px}
  .container{max-width:640px;margin:32px auto;padding:0 16px 40px}
  .card{background:#fff;border-radius:12px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
  .card h2{font-size:15px;font-weight:600;color:#A02820;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #F0B43C}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:500;color:#555;margin-bottom:5px}
  .field input{width:100%;height:40px;padding:0 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#222;transition:border-color .2s}
  .field input:focus{outline:none;border-color:#A02820}
  .search-wrap{position:relative}
  .dropdown{position:absolute;top:42px;left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:8px;z-index:99;max-height:220px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.1);display:none}
  .dropdown div{padding:9px 14px;font-size:14px;cursor:pointer;color:#222;border-bottom:1px solid #f0f0f0}
  .dropdown div:last-child{border-bottom:none}
  .dropdown div:hover{background:#fff5f5;color:#A02820}
  .dropdown .empty{color:#999;cursor:default}
  .dates-section{background:#fafafa;border-radius:10px;padding:16px;margin-bottom:20px;border:1px solid #eee}
  .dates-section h3{font-size:13px;font-weight:600;color:#555;margin-bottom:12px}
  .date-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .date-row input{flex:1;height:38px;padding:0 10px;border:1px solid #ddd;border-radius:8px;font-size:14px}
  .btn-remove{width:34px;height:34px;border:1px solid #ddd;background:#fff;border-radius:8px;cursor:pointer;font-size:16px;color:#999;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .btn-remove:hover{background:#ffeeee;color:#A02820;border-color:#A02820}
  .btn-add{height:34px;padding:0 14px;border:1px dashed #bbb;background:transparent;border-radius:8px;cursor:pointer;color:#888;font-size:13px;display:flex;align-items:center;gap:6px;margin-top:4px}
  .btn-add:hover{background:#fff5f5;color:#A02820;border-color:#A02820}
  .btn-gen{width:100%;height:48px;background:#A02820;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:16px;font-weight:600;letter-spacing:.3px;transition:background .2s}
  .btn-gen:hover{background:#881f18}
  .hint{font-size:12px;color:#888;margin-top:10px;text-align:center;line-height:1.5}
  .msg{padding:12px 16px;border-radius:8px;font-size:13px;margin-top:14px;display:none}
  .msg.ok{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
  .msg.err{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:480px){.grid2{grid-template-columns:1fr}}
</style>
</head>

// Vereinssuche
const vsEl = document.getElementById('verein-search');
const dd = document.getElementById('dropdown');
const vhEl = document.getElementById('verein-hidden');

vsEl.addEventListener('input', () => {
  const q = vsEl.value; vhEl.value = '';
  if (!q || q.length < 2) { dd.style.display = 'none'; return; }
  const res = VEREINE.filter(v => v.toLowerCase().includes(q.toLowerCase())).slice(0, 12);
  if (!res.length) { dd.innerHTML = '<div class="empty">Kein Verein gefunden</div>'; dd.style.display = 'block'; return; }
  dd.innerHTML = res.map(v => `<div onclick="selV('${v.replace(/'/g, "\\'")}')"> ${v}</div>`).join('');
  dd.style.display = 'block';
});
document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) dd.style.display = 'none'; });
function selV(v) { vsEl.value = v; vhEl.value = v; dd.style.display = 'none'; }

// Termine
let dc = 0;
function addDate() {
  dc++;
  const id = 'd' + dc;
  const row = document.createElement('div');
  row.className = 'date-row'; row.id = 'row-' + id;
  row.innerHTML = `<input type="date" id="date-${id}"><button class="btn-remove" onclick="removeDate('row-${id}')" title="Entfernen">✕</button>`;
  document.getElementById('date-list').appendChild(row);
}
function removeDate(id) { const el = document.getElementById(id); if (el) el.remove(); }
addDate();

function getDates() {
  const res = [];
  document.querySelectorAll('.date-row').forEach(r => {
    const id = r.id.replace('row-', '');
    const d = document.getElementById('date-' + id);
    if (d && d.value) {
      const dt = new Date(d.value + 'T00:00:00');
      const wd = ['So','Mo','Di','Mi','Do','Fr','Sa'][dt.getDay()];
      res.push(wd + ', ' + dt.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }));
    }
  });
  return res;
}

function showMsg(t, type) {
  const el = document.getElementById('msg');
  el.textContent = t; el.className = 'msg ' + type; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 6000);
}

function generatePDF() {
  const spieler = document.getElementById('spieler').value.trim();
  const verein = vhEl.value || vsEl.value.trim();
  const dates = getDates();
  if (!spieler) { showMsg('Bitte Namen des Spielers eingeben.', 'err'); return; }
  if (!verein)  { showMsg('Bitte Zielverein auswählen.', 'err'); return; }
  if (!dates.length) { showMsg('Bitte mindestens ein Datum eingeben.', 'err'); return; }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, H = 297;

  // Briefbogen als Hintergrund
  doc.addImage(BRIEFBOGEN, 'JPEG', 0, 0, W, H);

  // Titel
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(17);
  doc.setTextColor(20, 20, 20);
  doc.text('Genehmigung zum Probetraining', W/2, 68, { align: 'center' });
  doc.text('für Spieler der JSG Erft 01', W/2, 77, { align: 'center' });
  doc.text('bei einem anderen Verein', W/2, 86, { align: 'center' });

  // Fließtext
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10.5);
  doc.setTextColor(20, 20, 20);
  doc.text('Hiermit erteilt die JSG Erft 01, dem unten genannten Spieler eine Genehmigung zur', 20, 100);
  doc.text('Teilnahme an einem Probetraining bei dem Verein', 20, 107);

  // Verein
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.setTextColor(160, 40, 32);
  doc.text(verein, 20, 123);
  doc.setDrawColor(150, 150, 150);
  doc.line(20, 125, 115, 125);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(90, 90, 90);
  doc.text('Name des Vereins', 20, 129);

  // am + Datum
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10.5);
  doc.setTextColor(20, 20, 20);
  doc.text('am', 125, 118);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(160, 40, 32);
  const dateStr = dates.join(' / ');
  const dateLines = doc.splitTextToSize(dateStr, 65);
  doc.text(dateLines, 125, 123);
